<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reward App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    button {
      background: #00ffcc;
      color: #000;
      border: none;
      padding: 15px 30px;
      margin: 10px;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
    }
    button:hover {
      background: #00e6b8;
    }
    #rewardInfo {
      margin-top: 20px;
      font-size: 18px;
      color: #ff0;
    }
  </style>
</head>
<body>

  <h1>Welcome to Reward App</h1>
  <p>Follow our channels to earn coins!</p>

  <button id="followTelegram">Follow Telegram (500 coins)</button>
  <button id="followTikTok">Follow TikTok (1000 coins)</button>
  <br>
  <button onclick="canWithdraw()">Withdraw</button>

  <p id="rewardInfo"></p>

  <script>
    // Initialize coins if first time
    if(!localStorage.getItem('coins')) localStorage.setItem('coins', 0);

    // Telegram button
    document.getElementById('followTelegram').onclick = function() {
      window.open('https://t.me/YourChannelName', '_blank'); // Replace with your Telegram channel
      if(!localStorage.getItem('telegramFollowed')){
        localStorage.setItem('telegramFollowed', 'true');
        let coins = parseInt(localStorage.getItem('coins'));
        coins += 500;
        localStorage.setItem('coins', coins);
        document.getElementById('rewardInfo').innerText = "✅ You earned 500 coins! Total: " + coins;
      } else {
        document.getElementById('rewardInfo').innerText = "Already rewarded for Telegram. Total: " + localStorage.getItem('coins');
      }
    }

    // TikTok button
    document.getElementById('followTikTok').onclick = function() {
      window.open('https://www.tiktok.com/@YourAccountName', '_blank'); // Replace with your TikTok
      if(!localStorage.getItem('tiktokFollowed')){
        localStorage.setItem('tiktokFollowed', 'true');
        let coins = parseInt(localStorage.getItem('coins'));
        coins += 1000;
        localStorage.setItem('coins', coins);
        document.getElementById('rewardInfo').innerText = "✅ You earned 1000 coins! Total: " + coins;
      } else {
        document.getElementById('rewardInfo').innerText = "Already rewarded for TikTok. Total: " + localStorage.getItem('coins');
      }
    }

    // Withdraw function
    function canWithdraw() {
      if(localStorage.getItem('telegramFollowed') && localStorage.getItem('tiktokFollowed')){
        alert("🎉 You can withdraw now! Total coins: " + localStorage.getItem('coins'));
      } else {
        alert("⚠ Follow both Telegram and TikTok to unlock withdrawal!");
      }
    }
  </script>

</body>
</html>
